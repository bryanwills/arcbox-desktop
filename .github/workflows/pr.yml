name: PR Check

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Restore desktop Rust tooling cache
        id: desktop_rust_cache
        uses: actions/cache/restore@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            xtask/target/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-xtask-${{ hashFiles('xtask/Cargo.lock') }}-${{ hashFiles('xtask/Cargo.toml', 'xtask/src/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-xtask-${{ hashFiles('xtask/Cargo.lock') }}-
            ${{ runner.os }}-${{ runner.arch }}-cargo-xtask-

      - name: Verify protobuf generated code is up-to-date
        run: |
          brew install protobuf
          make verify-arcbox-protobuf

      - name: Swift format check
        run: |
          brew install swift-format
          swift-format lint -r --strict ArcBox/ Packages/

      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --strict --config .swiftlint.yml

      - name: Create local Xcode config
        run: |
          cat > Local.xcconfig <<'XCEOF'
          #include "Version.xcconfig"
          DEVELOPMENT_TEAM = 422ACSY6Y5
          SENTRY_DSN =
          POSTHOG_API_KEY =
          OIDC_ISSUER_URL =
          OIDC_CLIENT_ID =
          XCEOF

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate
          git diff --exit-code ArcBox.xcodeproj ArcBox/Info.plist project.yml

      - name: Record build environment
        id: build_environment
        run: |
          XCODE_CACHE_KEY=$(xcodebuild -version | awk 'NR == 1 { version = $2 } NR == 2 { build = $3 } END { print version "-" build }')
          echo "xcode_cache_key=$XCODE_CACHE_KEY" >> "$GITHUB_OUTPUT"
          echo "=== Build environment ==="
          echo "Runner architecture: $(uname -m)"
          echo "CPU: $(sysctl -n machdep.cpu.brand_string)"
          echo "Logical CPUs: $(sysctl -n hw.logicalcpu)"
          echo "Memory: $(sysctl -n hw.memsize) bytes"
          xcodebuild -version
          swiftc --version
          df -h "$GITHUB_WORKSPACE"

      - name: Restore Swift package cache
        id: swift_packages_cache
        uses: actions/cache/restore@v6
        with:
          path: .build/SourcePackages/
          key: ${{ runner.os }}-${{ runner.arch }}-swiftpm-${{ hashFiles('ArcBox.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'Packages/**/Package.resolved', 'Packages/**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-swiftpm-

      - name: Restore Xcode build cache
        id: xcode_build_cache
        uses: actions/cache/restore@v6
        with:
          path: |
            .build/DerivedData/Build/
            .build/DerivedData/ModuleCache.noindex/
          key: ${{ runner.os }}-${{ runner.arch }}-xcode-${{ steps.build_environment.outputs.xcode_cache_key }}-swift-${{ hashFiles('ArcBox.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'Packages/**/Package.resolved', 'Packages/**/Package.swift') }}-${{ hashFiles('ArcBox.xcodeproj/project.pbxproj') }}-${{ hashFiles('ArcBox/**', 'ArcBoxTests/**', 'Packages/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-xcode-${{ steps.build_environment.outputs.xcode_cache_key }}-swift-${{ hashFiles('ArcBox.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'Packages/**/Package.resolved', 'Packages/**/Package.swift') }}-${{ hashFiles('ArcBox.xcodeproj/project.pbxproj') }}-
            ${{ runner.os }}-${{ runner.arch }}-xcode-${{ steps.build_environment.outputs.xcode_cache_key }}-swift-${{ hashFiles('ArcBox.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'Packages/**/Package.resolved', 'Packages/**/Package.swift') }}-

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ArcBox.xcodeproj \
            -scheme ArcBox \
            -clonedSourcePackagesDirPath .build/SourcePackages

      - name: Build (Debug)
        run: |
          xcodebuild build \
            -project ArcBox.xcodeproj \
            -scheme ArcBox \
            -configuration Debug \
            -destination 'platform=macOS' \
            -showBuildTimingSummary \
            -derivedDataPath .build/DerivedData \
            -clonedSourcePackagesDirPath .build/SourcePackages \
            CODE_SIGN_IDENTITY=- \
            SKIP_RUST_BUILD=1 \
            | xcpretty --color

      - name: Run Tests
        run: |
          xcodebuild test \
            -project ArcBox.xcodeproj \
            -scheme ArcBox \
            -configuration Debug \
            -destination 'platform=macOS' \
            -showBuildTimingSummary \
            -derivedDataPath .build/DerivedData \
            -clonedSourcePackagesDirPath .build/SourcePackages \
            CODE_SIGN_IDENTITY=- \
            SKIP_RUST_BUILD=1 \
            | xcpretty --color

      - name: Warm Release cache (ARM64)
        if: github.event_name == 'push'
        run: |
          xcodebuild build \
            -project ArcBox.xcodeproj \
            -scheme ArcBox \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -showBuildTimingSummary \
            -derivedDataPath .build/DerivedData \
            -clonedSourcePackagesDirPath .build/SourcePackages \
            ARCHS=arm64 \
            CODE_SIGN_IDENTITY=- \
            SKIP_RUST_BUILD=1

      - name: Save desktop Rust tooling cache
        if: github.event_name == 'push' && steps.desktop_rust_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            xtask/target/
          key: ${{ steps.desktop_rust_cache.outputs.cache-primary-key }}

      - name: Save Swift package cache
        if: github.event_name == 'push' && steps.swift_packages_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: .build/SourcePackages/
          key: ${{ steps.swift_packages_cache.outputs.cache-primary-key }}

      - name: Save Xcode build cache
        if: github.event_name == 'push' && steps.xcode_build_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: |
            .build/DerivedData/Build/
            .build/DerivedData/ModuleCache.noindex/
          key: ${{ steps.xcode_build_cache.outputs.cache-primary-key }}
