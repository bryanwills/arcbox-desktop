name: Release DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0-alpha.1). Defaults to Version.xcconfig if empty.'
        required: false
        type: string
      arcbox_ref:
        description: 'arcbox repo ref to build Rust from (branch, tag, or SHA)'
        required: false
        default: 'master'
        type: string

concurrency:
  group: release-dmg-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  SPARKLE_VERSION: '2.9.0'

jobs:
  build-dmg:
    name: Build DMG (macOS ARM64)
    runs-on: macos-26
    timeout-minutes: 120
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
      channel: ${{ steps.resolve.outputs.channel }}
      dmg: ${{ steps.dmg.outputs.dmg }}
      ed_signature: ${{ steps.sparkle_sign.outputs.ed_signature }}
      dmg_length: ${{ steps.sparkle_sign.outputs.dmg_length }}
      build_number: ${{ steps.dmg.outputs.build_number }}

    steps:
      - name: Checkout arcbox-desktop
        uses: actions/checkout@v6
        with:
          # Full history only needed for git rev-list --count (build number).
          # Shallow+unshallow is slower than a single full fetch on this repo.
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Restore desktop Rust tooling cache
        id: desktop_rust_cache
        uses: actions/cache/restore@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            xtask/target/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-xtask-${{ hashFiles('xtask/Cargo.lock') }}-${{ hashFiles('xtask/Cargo.toml', 'xtask/src/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-xtask-${{ hashFiles('xtask/Cargo.lock') }}-
            ${{ runner.os }}-${{ runner.arch }}-cargo-xtask-

      - name: Resolve build metadata
        id: resolve
        run: |
          cargo xtask release resolve \
            --arcbox-ref "${{ inputs.arcbox_ref }}" \
            --tag "${{ inputs.tag }}"

      - name: Checkout arcbox
        id: checkout_arcbox
        uses: actions/checkout@v6
        with:
          repository: arcboxlabs/arcbox
          path: arcbox-core
          ref: ${{ steps.resolve.outputs.ref }}
          # Only need sources for assets.lock / entitlements / Makefile fallback.
          fetch-depth: 1

      - name: Install dependencies
        timeout-minutes: 5
        run: brew install create-dmg

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Store notarization credentials
        env:
          NOTARY_KEY: ${{ secrets.NOTARY_KEY }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.NOTARY_ISSUER }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$NOTARY_KEY" > "$RUNNER_TEMP/private_keys/AuthKey.p8"
          xcrun notarytool store-credentials "arcbox-notarize" \
            --key "$RUNNER_TEMP/private_keys/AuthKey.p8" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER"
          rm "$RUNNER_TEMP/private_keys/AuthKey.p8"

      - name: Decode provisioning profile
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          if [ -z "$APPLE_PROVISIONING_PROFILE" ]; then
            echo "::error::APPLE_PROVISIONING_PROFILE secret is not set"
            exit 1
          fi
          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode > "$RUNNER_TEMP/embedded.provisionprofile"
          echo "Decoded provisioning profile to $RUNNER_TEMP/embedded.provisionprofile"
          security cms -D -i "$RUNNER_TEMP/embedded.provisionprofile" | head -5

      - name: Download pre-built arcbox binaries
        id: prebuilt
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REF="${{ steps.resolve.outputs.ref }}"

          # Resolve which release to download:
          #   - If REF is a version tag (v*), use that exact release
          #   - Otherwise, use the latest release
          if [[ "$REF" =~ ^v[0-9] ]]; then
            RELEASE_TAG="$REF"
          else
            RELEASE_TAG=$(gh release list --repo arcboxlabs/arcbox --limit 1 --json tagName -q '.[0].tagName')
            if [ -z "$RELEASE_TAG" ]; then
              echo "No arcbox releases found, will build from source"
              exit 1
            fi
            echo "Ref '$REF' is not a version tag, using latest release: $RELEASE_TAG"
          fi

          echo "Downloading arcbox binaries from release $RELEASE_TAG..."

          DOWNLOAD_DIR="$(mktemp -d)"
          gh release download "$RELEASE_TAG" \
            --repo arcboxlabs/arcbox \
            --dir "$DOWNLOAD_DIR" \
            --skip-existing

          echo "Downloaded assets:"
          ls -la "$DOWNLOAD_DIR"

          # Extract tarballs to find binaries
          for tarball in "$DOWNLOAD_DIR"/*.tar.gz; do
            [ -f "$tarball" ] && tar xzf "$tarball" -C "$DOWNLOAD_DIR"
          done

          echo "Extracted contents:"
          find "$DOWNLOAD_DIR" -type f | head -40

          # Find host + guest binaries
          mkdir -p arcbox-core/target/release
          mkdir -p arcbox-core/target/aarch64-unknown-linux-musl/release
          CLI_BIN=$(find "$DOWNLOAD_DIR" -type f -name "abctl" | head -1)
          DAEMON_BIN=$(find "$DOWNLOAD_DIR" -type f -name "arcbox-daemon" | head -1)
          HELPER_BIN=$(find "$DOWNLOAD_DIR" -type f -name "arcbox-helper" | head -1)
          AGENT_BIN=$(find "$DOWNLOAD_DIR" -type f -name "arcbox-agent" | head -1)
          VM_AGENT_BIN=$(find "$DOWNLOAD_DIR" -type f -name "vm-agent" | head -1)

          if [ -z "$CLI_BIN" ] || [ -z "$DAEMON_BIN" ]; then
            echo "Could not find pre-built binaries in release assets"
            exit 1
          fi

          cp "$CLI_BIN" arcbox-core/target/release/abctl
          cp "$DAEMON_BIN" arcbox-core/target/release/arcbox-daemon
          chmod +x arcbox-core/target/release/abctl arcbox-core/target/release/arcbox-daemon

          if [ -n "$HELPER_BIN" ]; then
            cp "$HELPER_BIN" arcbox-core/target/release/arcbox-helper
            chmod +x arcbox-core/target/release/arcbox-helper
            echo "Found arcbox-helper in release assets"
          else
            echo "::warning::arcbox-helper not found in release assets"
          fi

          if [ -n "$AGENT_BIN" ]; then
            cp "$AGENT_BIN" arcbox-core/target/aarch64-unknown-linux-musl/release/arcbox-agent
            chmod +x arcbox-core/target/aarch64-unknown-linux-musl/release/arcbox-agent
            echo "Found arcbox-agent in release assets"
          else
            echo "::warning::arcbox-agent not found in release assets"
          fi

          # Sandbox microVM init; absent from pre-vm-agent arcbox releases,
          # in which case the DMG packager warns and ships without it.
          if [ -n "$VM_AGENT_BIN" ]; then
            cp "$VM_AGENT_BIN" arcbox-core/target/aarch64-unknown-linux-musl/release/vm-agent
            chmod +x arcbox-core/target/aarch64-unknown-linux-musl/release/vm-agent
            echo "Found vm-agent in release assets"
          else
            echo "::warning::vm-agent not found in release assets"
          fi

          # Prefer the bundle/ tree from the release tarball (source of truth for
          # daemon entitlements). Fall back to loose entitlements.plist.
          BUNDLE_DIR=$(find "$DOWNLOAD_DIR" -type d -name "bundle" | head -1)
          if [ -n "$BUNDLE_DIR" ]; then
            mkdir -p arcbox-core/bundle
            cp -R "$BUNDLE_DIR"/. arcbox-core/bundle/
            echo "Installed bundle/ from release assets"
          fi

          ENTITLEMENTS=$(find "$DOWNLOAD_DIR" -type f \( -name "arcbox.entitlements" -o -name "entitlements.plist" \) | head -1)
          if [ -n "$ENTITLEMENTS" ]; then
            mkdir -p arcbox-core/bundle arcbox-core/tests/resources
            # Canonical path used by xtask packaging.
            if [ ! -f arcbox-core/bundle/arcbox.entitlements ]; then
              cp "$ENTITLEMENTS" arcbox-core/bundle/arcbox.entitlements
            fi
            cp "$ENTITLEMENTS" arcbox-core/tests/resources/entitlements.plist
          fi

          file arcbox-core/target/release/abctl arcbox-core/target/release/arcbox-daemon
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: Restore arcbox Rust build cache
        id: arcbox_rust_cache
        if: steps.prebuilt.outputs.found != 'true'
        uses: actions/cache/restore@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            arcbox-core/target/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-arcbox-release-${{ hashFiles('arcbox-core/**/Cargo.lock') }}-${{ steps.checkout_arcbox.outputs.commit }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-arcbox-release-${{ hashFiles('arcbox-core/**/Cargo.lock') }}-
            ${{ runner.os }}-${{ runner.arch }}-cargo-arcbox-release-

      - name: Build Rust binaries (release)
        if: steps.prebuilt.outputs.found != 'true'
        timeout-minutes: 30
        run: |
          make build-rust ARCBOX_DIR="${{ github.workspace }}/arcbox-core"

      - name: Save arcbox Rust build cache
        if: steps.prebuilt.outputs.found != 'true' && steps.arcbox_rust_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            arcbox-core/target/
          key: ${{ steps.arcbox_rust_cache.outputs.cache-primary-key }}

      - name: Prefetch boot assets + Docker tools
        run: make prefetch ARCBOX_DIR="${{ github.workspace }}/arcbox-core" SKIP_BUILD=1

      - name: Download pstramp
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Read pinned version and checksum from assets.lock
          PSTRAMP_VERSION=$(awk '/name = "pstramp"/,/^$/' "${{ github.workspace }}/arcbox-core/assets.lock" \
            | grep '^version' | sed 's/.*= *"\(.*\)"/\1/')
          PSTRAMP_SHA256=$(awk '/name = "pstramp"/,/^$/' "${{ github.workspace }}/arcbox-core/assets.lock" \
            | grep 'arm64.sha256' | sed 's/.*= *"\(.*\)"/\1/')
          echo "Downloading pstramp v${PSTRAMP_VERSION}"
          mkdir -p pstramp/target/release
          gh release download "v${PSTRAMP_VERSION}" \
            --repo arcboxlabs/pstramp \
            --pattern "pstramp-*-aarch64-apple-darwin" \
            --output pstramp/target/release/pstramp
          # Verify checksum
          echo "${PSTRAMP_SHA256}  pstramp/target/release/pstramp" | shasum -a 256 -c -
          chmod +x pstramp/target/release/pstramp
          file pstramp/target/release/pstramp

      - name: Symlink arcbox repo for Xcode build phase
        run: ln -sfn "$GITHUB_WORKSPACE/arcbox-core" ../arcbox

      - name: Create Local.xcconfig
        run: |
          # Telemetry/Sparkle keys are injected into Info.plist at package time
          # by `cargo xtask macos dmg` (plutil), not via INFOPLIST_KEY_ build
          # settings — those silently drop custom keys. This file only supplies
          # the project base configuration.
          # The OIDC values expand into Info.plist at build time. They are not
          # secrets (public client + PKCE); the $() stops xcconfig from reading
          # "//" in the URL as a comment.
          cat > Local.xcconfig <<'XCEOF'
          #include "Version.xcconfig"
          OIDC_ISSUER_URL = https:/$()/auth.arcbox.dev/api/auth
          OIDC_CLIENT_ID = arcbox-desktop
          XCEOF

      - name: Trust SwiftPM plugins
        run: defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES

      - name: Record build environment
        id: build_environment
        run: |
          XCODE_CACHE_KEY=$(xcodebuild -version | awk 'NR == 1 { version = $2 } NR == 2 { build = $3 } END { print version "-" build }')
          echo "xcode_cache_key=$XCODE_CACHE_KEY" >> "$GITHUB_OUTPUT"
          echo "=== Build environment ==="
          echo "Runner architecture: $(uname -m)"
          echo "CPU: $(sysctl -n machdep.cpu.brand_string)"
          echo "Logical CPUs: $(sysctl -n hw.logicalcpu)"
          echo "Memory: $(sysctl -n hw.memsize) bytes"
          xcodebuild -version
          swiftc --version
          df -h "$GITHUB_WORKSPACE"

      - name: Restore Swift package cache
        id: swift_packages_cache
        uses: actions/cache/restore@v6
        with:
          path: .build/SourcePackages/
          key: ${{ runner.os }}-${{ runner.arch }}-swiftpm-${{ hashFiles('ArcBox.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'Packages/**/Package.resolved', 'Packages/**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-swiftpm-

      - name: Restore Xcode build cache
        id: xcode_build_cache
        uses: actions/cache/restore@v6
        with:
          path: |
            .build/DerivedData/Build/
            .build/DerivedData/ModuleCache.noindex/
          key: ${{ runner.os }}-${{ runner.arch }}-xcode-${{ steps.build_environment.outputs.xcode_cache_key }}-swift-${{ hashFiles('ArcBox.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'Packages/**/Package.resolved', 'Packages/**/Package.swift') }}-${{ hashFiles('ArcBox.xcodeproj/project.pbxproj') }}-${{ hashFiles('ArcBox/**', 'ArcBoxTests/**', 'Packages/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-xcode-${{ steps.build_environment.outputs.xcode_cache_key }}-swift-${{ hashFiles('ArcBox.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'Packages/**/Package.resolved', 'Packages/**/Package.swift') }}-${{ hashFiles('ArcBox.xcodeproj/project.pbxproj') }}-
            ${{ runner.os }}-${{ runner.arch }}-xcode-${{ steps.build_environment.outputs.xcode_cache_key }}-swift-${{ hashFiles('ArcBox.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'Packages/**/Package.resolved', 'Packages/**/Package.swift') }}-

      - name: Build DMG
        id: dmg
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          /usr/bin/time -lp make dmg-release \
            ARCBOX_DIR="${{ github.workspace }}/arcbox-core" \
            SKIP_BUILD=1 \
            SKIP_RESOURCES=1 \
            SKIP_XCODE_EMBED=1 \
            SIGN_IDENTITY="${{ secrets.APPLE_SIGNING_IDENTITY }}" \
            VERSION="${{ steps.resolve.outputs.version }}" \
            SPARKLE_FEED_URL="https://release.arcboxcdn.com/desktop/appcast/${{ steps.resolve.outputs.channel }}.xml" \
            NOTARIZE=1 \
            PROVISIONING_PROFILE="$RUNNER_TEMP/embedded.provisionprofile"

          # Prefer outputs written by xtask (dmg / dmg_path / build_number).
          # Fall back to a filesystem scan if GITHUB_OUTPUT was not available.
          if ! grep -q '^dmg_path=' "$GITHUB_OUTPUT" 2>/dev/null; then
            DMG_PATH=$(find "${{ github.workspace }}/arcbox-core/target" \
              -maxdepth 1 -type f -name 'ArcBox-*.dmg' -print -quit)
            if [ -z "$DMG_PATH" ]; then
              echo "::error::DMG not found under arcbox-core/target"
              exit 1
            fi
            {
              echo "dmg=$(basename "$DMG_PATH")"
              echo "dmg_path=$DMG_PATH"
            } >> "$GITHUB_OUTPUT"
          fi
          if ! grep -q '^build_number=' "$GITHUB_OUTPUT" 2>/dev/null; then
            echo "build_number=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify release architecture
        run: |
          APP_BINARY="${{ github.workspace }}/arcbox-core/target/dmg-build/ArcBox.app/Contents/MacOS/ArcBox"
          ARCHITECTURES=$(lipo -archs "$APP_BINARY")
          file "$APP_BINARY"
          echo "Architectures: $ARCHITECTURES"
          if [ "$ARCHITECTURES" != "arm64" ]; then
            echo "::error::Expected ARM64-only app binary, found: $ARCHITECTURES"
            exit 1
          fi
          # Confirm packaging embedded the prebuilt host binaries.
          for bin in abctl arcbox-helper; do
            path="${{ github.workspace }}/arcbox-core/target/dmg-build/ArcBox.app/Contents/MacOS/bin/$bin"
            if [ -f "$path" ]; then
              file "$path"
            else
              echo "::warning::$bin missing from packaged app (optional for older arcbox releases)"
            fi
          done
          test -f "${{ github.workspace }}/arcbox-core/target/dmg-build/ArcBox.app/Contents/MacOS/bin/abctl"

      - name: Report build cache sizes
        if: always()
        run: |
          echo "Desktop Rust exact cache hit: ${{ steps.desktop_rust_cache.outputs.cache-hit }}"
          echo "Swift packages exact cache hit: ${{ steps.swift_packages_cache.outputs.cache-hit }}"
          echo "Xcode build exact cache hit: ${{ steps.xcode_build_cache.outputs.cache-hit }}"
          echo "=== Build cache footprint ==="
          for path in \
            xtask/target \
            .build/SourcePackages \
            .build/DerivedData/Build \
            .build/DerivedData/ModuleCache.noindex; do
            if [ -e "$path" ]; then
              du -sh "$path"
            fi
          done

      - name: Save desktop Rust tooling cache
        if: success() && steps.desktop_rust_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            xtask/target/
          key: ${{ steps.desktop_rust_cache.outputs.cache-primary-key }}

      - name: Save Swift package cache
        if: success() && steps.swift_packages_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: .build/SourcePackages/
          key: ${{ steps.swift_packages_cache.outputs.cache-primary-key }}

      - name: Save Xcode build cache
        if: success() && steps.xcode_build_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: |
            .build/DerivedData/Build/
            .build/DerivedData/ModuleCache.noindex/
          key: ${{ steps.xcode_build_cache.outputs.cache-primary-key }}

      - name: Generate checksum
        run: |
          DMG_PATH="${{ steps.dmg.outputs.dmg_path }}"
          shasum -a 256 "$DMG_PATH" > "${DMG_PATH}.sha256"
          cat "${DMG_PATH}.sha256"

      - name: Cache Sparkle sign_update
        id: sparkle_cache
        uses: actions/cache@v6
        with:
          path: /tmp/sparkle-bin
          key: sparkle-sign-update-${{ env.SPARKLE_VERSION }}

      - name: Download Sparkle sign_update
        if: steps.sparkle_cache.outputs.cache-hit != 'true'
        run: |
          SPARKLE_VER="${{ env.SPARKLE_VERSION }}"
          curl -fSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VER}/Sparkle-${SPARKLE_VER}.tar.xz" \
            -o "$RUNNER_TEMP/Sparkle.tar.xz"
          tar xJf "$RUNNER_TEMP/Sparkle.tar.xz" -C "$RUNNER_TEMP"
          mkdir -p /tmp/sparkle-bin
          cp "$RUNNER_TEMP/bin/sign_update" /tmp/sparkle-bin/sign_update
          chmod +x /tmp/sparkle-bin/sign_update

      - name: Sign DMG with Sparkle EdDSA
        id: sparkle_sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SPARKLE_PRIVATE_KEY:-}" ]; then
            echo "::error::SPARKLE_PRIVATE_KEY secret is not set"
            exit 1
          fi

          SIGN_UPDATE="/tmp/sparkle-bin/sign_update"
          DMG_PATH="${{ steps.dmg.outputs.dmg_path }}"

          KEY_FILE="$(mktemp)"
          chmod 600 "$KEY_FILE"
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"
          SIGN_OUTPUT=$("$SIGN_UPDATE" "$DMG_PATH" -f "$KEY_FILE" 2>&1) || {
            echo "::error::sign_update failed"
            echo "$SIGN_OUTPUT"
            exit 1
          }
          rm -f "$KEY_FILE"

          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          if [ -z "$ED_SIGNATURE" ]; then
            echo "::error::Failed to extract EdDSA signature from sign_update output"
            exit 1
          fi

          DMG_LENGTH=$(echo "$SIGN_OUTPUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')
          if [ -z "$DMG_LENGTH" ]; then
            DMG_LENGTH=$(stat -f%z "$DMG_PATH")
          fi

          echo "ed_signature=$ED_SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "dmg_length=$DMG_LENGTH" >> "$GITHUB_OUTPUT"
          echo "EdDSA signature: ${ED_SIGNATURE:0:20}..."
          echo "DMG length: $DMG_LENGTH"

      - name: Cache sentry-cli
        id: sentry_cli_cache
        if: ${{ vars.SENTRY_ORG != '' }}
        uses: actions/cache@v6
        with:
          path: /tmp/sentry-cli
          # Bump the suffix when pinning a new sentry-cli release.
          key: sentry-cli-macos-arm64-2.46.0

      - name: Install sentry-cli
        if: ${{ vars.SENTRY_ORG != '' && steps.sentry_cli_cache.outputs.cache-hit != 'true' }}
        run: |
          set -euo pipefail
          SENTRY_CLI_VER=2.46.0
          mkdir -p /tmp/sentry-cli
          curl -fSL \
            "https://github.com/getsentry/sentry-cli/releases/download/${SENTRY_CLI_VER}/sentry-cli-Darwin-arm64" \
            -o /tmp/sentry-cli/sentry-cli
          chmod +x /tmp/sentry-cli/sentry-cli
          /tmp/sentry-cli/sentry-cli --version

      - name: Upload dSYMs to Sentry
        if: ${{ vars.SENTRY_ORG != '' }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail
          SENTRY_CLI=/tmp/sentry-cli/sentry-cli
          if [ ! -x "$SENTRY_CLI" ]; then
            echo "::error::sentry-cli missing at $SENTRY_CLI"
            exit 1
          fi

          # Prefer the deterministic DerivedData path used by xtask packaging.
          DSYM_ROOTS=(
            "${{ github.workspace }}/.build/DerivedData/Build/Products/Release"
            "${{ github.workspace }}/arcbox-core/target/dmg-build"
          )
          uploaded=0
          for root in "${DSYM_ROOTS[@]}"; do
            [ -d "$root" ] || continue
            while IFS= read -r -d '' dsym; do
              echo "Uploading dSYM: $dsym"
              "$SENTRY_CLI" debug-files upload --include-sources "$dsym"
              uploaded=$((uploaded + 1))
            done < <(find "$root" -name '*.dSYM' -type d -print0 2>/dev/null)
          done
          if [ "$uploaded" -eq 0 ]; then
            echo "::warning::No dSYMs found under packaging output paths"
          else
            echo "Uploaded $uploaded dSYM bundle(s)"
          fi

          "$SENTRY_CLI" releases new "$VERSION" || true
          "$SENTRY_CLI" releases set-commits "$VERSION" --auto || true
          "$SENTRY_CLI" releases finalize "$VERSION" || true

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v6
        with:
          name: arcbox-desktop-dmg
          path: |
            ${{ steps.dmg.outputs.dmg_path }}
            ${{ steps.dmg.outputs.dmg_path }}.sha256
          retention-days: 30

      # Keychain cleanup is handled automatically by apple-actions/import-codesign-certs

  create-release:
    name: Create Release
    needs: [build-dmg]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts/ -type f \( -name '*.dmg' -o -name '*.sha256' \) \
            -exec cp {} release-assets/ \;
          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-dmg.outputs.version || github.ref_name }}
          name: ArcBox ${{ needs.build-dmg.outputs.version || github.ref_name }}
          draft: false
          prerelease: ${{ needs.build-dmg.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            release-assets/*.dmg
            release-assets/*.sha256
          body: |
            ## Installation

            Download `${{ needs.build-dmg.outputs.dmg }}`, open the DMG, and drag ArcBox to Applications.

            Boot-assets and daemon are bundled — no additional setup required.

            ### Verify checksum

            ```bash
            shasum -a 256 -c ${{ needs.build-dmg.outputs.dmg }}.sha256
            ```

  upload-cdn:
    name: Upload to CDN
    needs: [build-dmg]
    runs-on: ubuntu-latest
    permissions:
      # The releases/generate-notes API requires contents: write.
      contents: write

    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: arcbox-desktop-dmg
          path: artifacts/

      - name: Determine channel
        id: channel
        run: |
          VERSION="${{ needs.build-dmg.outputs.version }}"
          CHANNEL="${{ needs.build-dmg.outputs.channel }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "Channel: $CHANNEL, Version: $VERSION"

      # Sparkle renders these inline in the update dialog. Linking the GitHub
      # release page instead would load the whole GitHub website in the dialog.
      - name: Generate release notes HTML
        id: release_notes
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.build-dmg.outputs.version }}"
          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$VERSION" --jq '.body // empty' > notes.md
          # GitHub-flavored HTML, with PR/compare URLs collapsed to short links
          gh api markdown -f mode=gfm -f context="$GITHUB_REPOSITORY" \
            -F text=@notes.md > notes.html
          [ -s notes.html ]
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: Generate appcast + latest.json
        id: feeds
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.channel.outputs.version }}
          CHANNEL: ${{ steps.channel.outputs.channel }}
          BUILD_NUMBER: ${{ needs.build-dmg.outputs.build_number }}
          DMG_NAME: ${{ needs.build-dmg.outputs.dmg }}
          DMG_LENGTH: ${{ needs.build-dmg.outputs.dmg_length }}
          ED_SIGNATURE: ${{ needs.build-dmg.outputs.ed_signature }}
          HAS_NOTES: ${{ steps.release_notes.outputs.found }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const {
              VERSION, CHANNEL, BUILD_NUMBER, DMG_NAME, DMG_LENGTH, ED_SIGNATURE, HAS_NOTES,
            } = process.env;
            const displayVersion = VERSION.replace(/^v/, '');
            const dmgUrl = `https://release.arcboxcdn.com/desktop/${VERSION}/${DMG_NAME}`;
            const minMacos = '15.0';

            async function fetchOptional(url) {
              try {
                const res = await fetch(url, { signal: AbortSignal.timeout(15000) });
                if (!res.ok) return null;
                return Buffer.from(await res.arrayBuffer()).toString('utf8');
              } catch {
                return null;
              }
            }

            function cdata(text) {
              return `<![CDATA[${text.replaceAll(']]>', ']]]]><![CDATA[>')}]]>`;
            }

            function rfc2822Now() {
              // Match Python email.utils.formatdate(usegmt=True) / xtask output.
              return new Date().toUTCString().replace(/GMT$/, 'GMT').replace(/UTC$/, 'GMT');
            }

            function buildItem({ releaseNotesHtml }) {
              const channelElement = CHANNEL !== 'stable'
                ? `\n        <sparkle:channel>${CHANNEL}</sparkle:channel>`
                : '';
              const notesElement = releaseNotesHtml
                ? `        <description>${cdata(releaseNotesHtml)}</description>`
                : `        <sparkle:releaseNotesLink>https://github.com/arcboxlabs/arcbox-desktop/releases/tag/v${displayVersion}</sparkle:releaseNotesLink>`;
              return [
                '      <item>',
                `        <title>ArcBox ${displayVersion}</title>`,
                notesElement,
                `        <pubDate>${rfc2822Now()}</pubDate>`,
                `        <sparkle:version>${BUILD_NUMBER}</sparkle:version>`,
                `        <sparkle:shortVersionString>${displayVersion}</sparkle:shortVersionString>${channelElement}`,
                `        <sparkle:minimumSystemVersion>${minMacos}</sparkle:minimumSystemVersion>`,
                '        <enclosure',
                `          url="${dmgUrl}"`,
                `          length="${DMG_LENGTH}"`,
                '          type="application/octet-stream"',
                `          sparkle:edSignature="${ED_SIGNATURE}"`,
                '        />',
                '      </item>',
              ].join('\n');
            }

            function newAppcast(item) {
              return [
                '<?xml version="1.0" encoding="utf-8"?>',
                '<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">',
                '  <channel>',
                '    <title>ArcBox</title>',
                '    <link>https://arcbox.dev</link>',
                '    <description>ArcBox release feed</description>',
                '    <language>en</language>',
                item,
                '    </channel>',
                '  </rss>',
                '',
              ].join('\n');
            }

            function mergeAppcast(existing, item) {
              // Drop any existing <item> matching this version by shortVersionString or sparkle:version.
              let merged = existing.replace(/\s*<item>[\s\S]*?<\/item>/g, (itemXml) => {
                for (const tag of ['sparkle:shortVersionString', 'sparkle:version']) {
                  if (itemXml.includes(`<${tag}>${displayVersion}</${tag}>`)) {
                    return '';
                  }
                }
                return itemXml;
              });
              // Strip legacy <sparkle:channel>stable</sparkle:channel> tags.
              merged = merged.replace(/\n\s*<sparkle:channel>stable<\/sparkle:channel>/g, '');
              if (!merged.includes('    </channel>')) {
                throw new Error('existing appcast missing </channel> marker');
              }
              return merged.replace('    </channel>', `${item}\n    </channel>`);
            }

            let releaseNotesHtml = null;
            if (HAS_NOTES === 'true' && fs.existsSync('notes.html')) {
              const raw = fs.readFileSync('notes.html', 'utf8').trim();
              if (raw) releaseNotesHtml = raw;
            }

            const item = buildItem({ releaseNotesHtml });
            const existingAppcast = await fetchOptional(
              `https://release.arcboxcdn.com/desktop/appcast/${CHANNEL}.xml`,
            );
            const appcast = existingAppcast
              ? mergeAppcast(existingAppcast, item)
              : newAppcast(item);

            const existingLatestRaw = await fetchOptional(
              'https://release.arcboxcdn.com/desktop/latest.json',
            );
            let latest = {};
            if (existingLatestRaw) {
              try {
                latest = JSON.parse(existingLatestRaw);
              } catch {
                latest = {};
              }
            }
            latest[CHANNEL] = {
              date: new Date().toISOString().replace(/\.\d{3}Z$/, 'Z'),
              version: displayVersion,
            };
            // Pretty-print with sorted top-level keys (matches prior xtask output).
            const sortedLatest = Object.fromEntries(
              Object.keys(latest).sort().map((k) => [k, latest[k]]),
            );

            fs.mkdirSync(path.join('cdn-staging', 'desktop', 'appcast'), { recursive: true });
            fs.mkdirSync(path.join('cdn-staging', 'desktop', VERSION), { recursive: true });
            fs.writeFileSync(
              path.join('cdn-staging', 'desktop', 'appcast', `${CHANNEL}.xml`),
              appcast,
            );
            fs.writeFileSync(
              path.join('cdn-staging', 'desktop', 'latest.json'),
              `${JSON.stringify(sortedLatest, null, 2)}\n`,
            );
            core.info(existingAppcast ? `Merged appcast for ${displayVersion}` : `Created appcast for ${displayVersion}`);
            core.info(`latest.json channels: ${Object.keys(sortedLatest).join(', ')}`);

      - name: Prepare staging directory
        run: |
          VERSION="${{ steps.channel.outputs.version }}"
          DMG_NAME="${{ needs.build-dmg.outputs.dmg }}"

          # Copy DMG and checksum to versioned path
          mkdir -p "cdn-staging/desktop/${VERSION}"
          find artifacts/ -name '*.dmg' -exec cp {} "cdn-staging/desktop/${VERSION}/${DMG_NAME}" \;
          find artifacts/ -name '*.sha256' -exec cp {} "cdn-staging/desktop/${VERSION}/${DMG_NAME}.sha256" \;

          echo "=== CDN staging ==="
          find cdn-staging/ -type f | sort

      - name: Upload DMG to B2 (size-only)
        run: |
          VERSION="${{ steps.channel.outputs.version }}"
          aws s3 sync \
            "cdn-staging/desktop/${VERSION}/" \
            "s3://${{ secrets.RELEASE_B2_BUCKET }}/desktop/${VERSION}/" \
            --endpoint-url "https://s3.${{ secrets.RELEASE_B2_REGION }}.backblazeb2.com" \
            --size-only
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.RELEASE_B2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.RELEASE_B2_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.RELEASE_B2_REGION }}

      - name: Upload appcast and latest.json to B2
        run: |
          CHANNEL="${{ steps.channel.outputs.channel }}"
          aws s3 cp \
            "cdn-staging/desktop/appcast/${CHANNEL}.xml" \
            "s3://${{ secrets.RELEASE_B2_BUCKET }}/desktop/appcast/${CHANNEL}.xml" \
            --endpoint-url "https://s3.${{ secrets.RELEASE_B2_REGION }}.backblazeb2.com" \
            --content-type "application/xml"
          aws s3 cp \
            "cdn-staging/desktop/latest.json" \
            "s3://${{ secrets.RELEASE_B2_BUCKET }}/desktop/latest.json" \
            --endpoint-url "https://s3.${{ secrets.RELEASE_B2_REGION }}.backblazeb2.com" \
            --content-type "application/json"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.RELEASE_B2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.RELEASE_B2_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.RELEASE_B2_REGION }}

      - name: Verify CDN URLs
        id: cdn_verify
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.channel.outputs.version }}
          CHANNEL: ${{ steps.channel.outputs.channel }}
          DMG_NAME: ${{ needs.build-dmg.outputs.dmg }}
        with:
          script: |
            const { VERSION, CHANNEL, DMG_NAME } = process.env;
            await new Promise((r) => setTimeout(r, 5000));
            const urls = [
              `https://release.arcboxcdn.com/desktop/${VERSION}/${DMG_NAME}`,
              `https://release.arcboxcdn.com/desktop/appcast/${CHANNEL}.xml`,
              'https://release.arcboxcdn.com/desktop/latest.json',
            ];
            let failed = false;
            for (const url of urls) {
              let status = 0;
              try {
                status = (await fetch(url, { signal: AbortSignal.timeout(15000) })).status;
              } catch {
                status = 0;
              }
              core.info(`CDN check: ${url} -> HTTP ${status}`);
              if (status !== 200) {
                core.warning(`CDN returned HTTP ${status} for ${url}`);
                failed = true;
              }
            }
            if (failed) core.warning('Some CDN URLs did not return HTTP 200');
            core.setOutput('ok', failed ? 'false' : 'true');

      - name: Update Dub download short link
        if: needs.build-dmg.outputs.channel == 'stable' && steps.cdn_verify.outputs.ok == 'true'
        uses: actions/github-script@v7
        env:
          DUB_API_KEY: ${{ secrets.DUB_API_KEY }}
          DUB_LINK_ID: ${{ secrets.DUB_LINKID_DOWNLOAD_DESKTOP_ARM64 }}
          VERSION: ${{ steps.channel.outputs.version }}
          DMG_NAME: ${{ needs.build-dmg.outputs.dmg }}
        with:
          script: |
            const { DUB_API_KEY, DUB_LINK_ID, VERSION, DMG_NAME } = process.env;
            if (!DUB_API_KEY) {
              core.warning('DUB_API_KEY is not set, skipping Dub link update');
              return;
            }
            if (!DUB_LINK_ID) {
              core.warning('DUB_LINKID_DOWNLOAD_DESKTOP_ARM64 is not set, skipping');
              return;
            }
            const cdnUrl = `https://release.arcboxcdn.com/desktop/${VERSION}/${DMG_NAME}`;
            const res = await fetch(`https://api.dub.co/links/${DUB_LINK_ID}`, {
              method: 'PATCH',
              headers: {
                Authorization: `Bearer ${DUB_API_KEY}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ url: cdnUrl }),
            });
            if (!res.ok) {
              core.setFailed(`Dub API returned HTTP ${res.status}: ${await res.text()}`);
              return;
            }
            const data = await res.json();
            core.info(JSON.stringify({ shortLink: data.shortLink, url: data.url }));
            core.info(`Updated ARM64 download link -> ${cdnUrl}`);

  # ==========================================================================
  # Update Homebrew tap Cask with new version and SHA256.
  # The tap edit lives in arcboxlabs/homebrew-tap/.github/actions/bump-cask.
  # ==========================================================================
  update-homebrew-tap:
    name: Update Homebrew tap
    needs: [build-dmg, upload-cdn]
    if: needs.build-dmg.outputs.channel == 'stable'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          repositories: homebrew-tap

      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: arcbox-desktop-dmg
          path: artifacts/

      - name: Hash ArcBox DMG
        id: cask-shas
        env:
          VERSION: ${{ needs.build-dmg.outputs.version }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          dmg_path="$(find artifacts/ -type f -name '*.dmg' -print -quit)"
          if [ -z "$dmg_path" ]; then
            echo "Error: No DMG file found under artifacts/" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "arm=$(sha256sum "$dmg_path" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Bump Homebrew cask
        uses: arcboxlabs/homebrew-tap/.github/actions/bump-cask@6ae026934e8dd30533bbbd73a3be6b7958fe2062
        with:
          token: ${{ steps.app-token.outputs.token }}
          cask: arcbox@latest
          version: ${{ steps.cask-shas.outputs.version }}
          arm_sha256: ${{ steps.cask-shas.outputs.arm }}

  # ==========================================================================
  # Sync shipped issues to Linear Releases (continuous, stable channel only)
  #
  # Runs after the DMG is live on the CDN/appcast, so each Linear release records
  # what actually reached stable users via Sparkle auto-update — the real
  # "delivered" signal, distinct from a merged PR. Only the stable channel is
  # tracked; alpha/beta/rc builds are skipped. Issues are associated by scanning
  # commits since the previous release for PR references (#NNN, which Linear
  # resolves to their linked issues) and ABXD-123 identifiers. Requires the
  # LINEAR_ACCESS_KEY secret (the pipeline's access key from Linear → Settings →
  # Releases; not a personal API key).
  # ==========================================================================
  linear-release:
    name: Sync Linear Release
    needs: [build-dmg, upload-cdn]
    if: needs.build-dmg.outputs.channel == 'stable'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history required for commit-range scanning

      - uses: linear/linear-release-action@v0
        with:
          access_key: ${{ secrets.LINEAR_ACCESS_KEY }}
          version: ${{ needs.build-dmg.outputs.version }}
          links: https://github.com/${{ github.repository }}/releases/tag/${{ needs.build-dmg.outputs.version }}
