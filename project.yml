name: ArcBox
options:
  minimumXcodeGenVersion: 2.45.4
  defaultConfig: Release
  deploymentTarget:
    macOS: "15.0"
  localPackagesGroup: Packages

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Local.xcconfig
  Release: Local.xcconfig

packages:
  ArcBoxAuth:
    path: Packages/ArcBoxAuth
  ArcBoxClient:
    path: Packages/ArcBoxClient
  DockerClient:
    path: Packages/DockerClient
  K8sClient:
    path: Packages/K8sClient
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: 1.0.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.0
  sentry-cocoa:
    url: https://github.com/getsentry/sentry-cocoa
    from: 9.7.0
  posthog-ios:
    url: https://github.com/PostHog/posthog-ios
    from: 3.0.0

fileGroups:
  - CHANGELOG.md
  - arcbox.version
  - LaunchDaemons

settings:
  base:
    ALWAYS_SEARCH_USER_PATHS: NO
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    CLANG_ANALYZER_NONNULL: YES
    CLANG_ANALYZER_NUMBER_OBJECT_CONVERSION: YES_AGGRESSIVE
    CLANG_CXX_LANGUAGE_STANDARD: gnu++20
    CLANG_ENABLE_MODULES: YES
    CLANG_ENABLE_OBJC_ARC: YES
    CLANG_ENABLE_OBJC_WEAK: YES
    CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: YES
    CLANG_WARN_BOOL_CONVERSION: YES
    CLANG_WARN_COMMA: YES
    CLANG_WARN_CONSTANT_CONVERSION: YES
    CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS: YES
    CLANG_WARN_DIRECT_OBJC_ISA_USAGE: YES_ERROR
    CLANG_WARN_DOCUMENTATION_COMMENTS: YES
    CLANG_WARN_EMPTY_BODY: YES
    CLANG_WARN_ENUM_CONVERSION: YES
    CLANG_WARN_INFINITE_RECURSION: YES
    CLANG_WARN_INT_CONVERSION: YES
    CLANG_WARN_NON_LITERAL_NULL_CONVERSION: YES
    CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF: YES
    CLANG_WARN_OBJC_LITERAL_CONVERSION: YES
    CLANG_WARN_OBJC_ROOT_CLASS: YES_ERROR
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
    CLANG_WARN_RANGE_LOOP_ANALYSIS: YES
    CLANG_WARN_STRICT_PROTOTYPES: YES
    CLANG_WARN_SUSPICIOUS_MOVE: YES
    CLANG_WARN_UNGUARDED_AVAILABILITY: YES_AGGRESSIVE
    CLANG_WARN_UNREACHABLE_CODE: YES
    CLANG_WARN__DUPLICATE_METHOD_MATCH: YES
    COPY_PHASE_STRIP: NO
    DEAD_CODE_STRIPPING: YES
    DEVELOPMENT_TEAM: 422ACSY6Y5
    ENABLE_STRICT_OBJC_MSGSEND: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GCC_C_LANGUAGE_STANDARD: gnu17
    GCC_NO_COMMON_BLOCKS: YES
    GCC_WARN_64_TO_32_BIT_CONVERSION: YES
    GCC_WARN_ABOUT_RETURN_TYPE: YES_ERROR
    GCC_WARN_UNDECLARED_SELECTOR: YES
    GCC_WARN_UNINITIALIZED_AUTOS: YES_AGGRESSIVE
    GCC_WARN_UNUSED_FUNCTION: YES
    GCC_WARN_UNUSED_VARIABLE: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    MTL_FAST_MATH: YES
    SDKROOT: macosx
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    SWIFT_VERSION: 6.0
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
      ENABLE_TESTABILITY: YES
      GCC_DYNAMIC_NO_PIC: NO
      GCC_OPTIMIZATION_LEVEL: 0
      GCC_PREPROCESSOR_DEFINITIONS:
        - DEBUG=1
        - $(inherited)
      MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
      ONLY_ACTIVE_ARCH: YES
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG $(inherited)
      SWIFT_OPTIMIZATION_LEVEL: -Onone
    Release:
      # Keep dSYMs for crash symbolication; strip the installed binary so the
      # shipped ArcBox Mach-O drops local symbols (~64MB → ~25MB on arm64).
      COPY_PHASE_STRIP: YES
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      DEPLOYMENT_POSTPROCESSING: YES
      ENABLE_NS_ASSERTIONS: NO
      MTL_ENABLE_DEBUG_INFO: NO
      STRIP_INSTALLED_PRODUCT: YES
      STRIP_STYLE: all
      SWIFT_COMPILATION_MODE: wholemodule

targets:
  ArcBox:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    configFiles:
      Debug: Local.xcconfig
      Release: Version.xcconfig
    sources:
      - path: ArcBox
      - path: CHANGELOG.md
        buildPhase: resources
      - path: arcbox.version
        buildPhase: resources
      - path: LaunchDaemons/com.arcboxlabs.desktop.daemon.plist
        buildPhase:
          copyFiles:
            destination: wrapper
            subpath: Contents/Library/LaunchAgents
    dependencies:
      - package: ArcBoxAuth
      - package: ArcBoxClient
      - package: DockerClient
      - package: K8sClient
      - package: SwiftTerm
      - package: Sparkle
      - package: sentry-cocoa
        product: Sentry
      - package: posthog-ios
        product: PostHog
    preBuildScripts:
      - name: Embed Arcbox Binaries
        shell: /bin/bash
        basedOnDependencyAnalysis: false
        script: |
          if [ "$SKIP_RUST_BUILD" = "1" ]; then echo 'note: SKIP_RUST_BUILD=1, skipping binary embedding'; exit 0; fi
          export PATH="$HOME/.cargo/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
          cd "${PROJECT_DIR}"
          exec cargo xtask macos embed
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        AUTOMATION_APPLE_EVENTS: YES
        CODE_SIGN_ENTITLEMENTS: ArcBox/ArcBox.entitlements
        CODE_SIGN_IDENTITY[sdk=macosx*]: Apple Development
        CODE_SIGN_STYLE: Automatic
        COMBINE_HIDPI_IMAGES: YES
        DEAD_CODE_STRIPPING: YES
        DEVELOPMENT_TEAM: 422ACSY6Y5
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        # Merged into the generated Info.plist; declares the arcbox:// URL scheme.
        INFOPLIST_FILE: ArcBox/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: $(ARCBOX_APP_DISPLAY_NAME)
        INFOPLIST_KEY_CFBundleName: $(ARCBOX_PRODUCT_NAME)
        INFOPLIST_KEY_NSAppleEventsUsageDescription: ArcBox uses Automation to open your selected terminal app and run container shell commands.
        INFOPLIST_KEY_NSHumanReadableCopyright: Copyright © 2026 ArcBox Labs. Licensed under MIT OR Apache-2.0.
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
        # Promote ActorIsolatedCall diagnostics to errors. Lives here (not a
        # hand edit of the generated pbxproj) so xcodegen regeneration keeps it.
        OTHER_SWIFT_FLAGS: -Werror ActorIsolatedCall
        PRODUCT_BUNDLE_IDENTIFIER: $(ARCBOX_PRODUCT_BUNDLE_IDENTIFIER)
        PRODUCT_NAME: $(ARCBOX_PRODUCT_NAME)
        REGISTER_APP_GROUPS: YES
        RUNTIME_EXCEPTION_ALLOW_DYLD_ENVIRONMENT_VARIABLES: NO
        RUNTIME_EXCEPTION_ALLOW_JIT: YES
        RUNTIME_EXCEPTION_ALLOW_UNSIGNED_EXECUTABLE_MEMORY: NO
        RUNTIME_EXCEPTION_DEBUGGING_TOOL: NO
        RUNTIME_EXCEPTION_DISABLE_EXECUTABLE_PAGE_PROTECTION: NO
        RUNTIME_EXCEPTION_DISABLE_LIBRARY_VALIDATION: NO
        STRING_CATALOG_GENERATE_SYMBOLS: YES
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES
        SWIFT_VERSION: 6.0

  ArcBoxTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: ArcBoxTests
    dependencies:
      - target: ArcBox
      - package: K8sClient
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        DEAD_CODE_STRIPPING: YES
        DEVELOPMENT_TEAM: 422ACSY6Y5
        GENERATE_INFOPLIST_FILE: YES
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        MARKETING_VERSION: 1.0
        PRODUCT_BUNDLE_IDENTIFIER: com.arcboxlabs.desktop.tests
        PRODUCT_NAME: $(TARGET_NAME)
        SWIFT_VERSION: 6.0
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/$(ARCBOX_PRODUCT_NAME).app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/$(ARCBOX_PRODUCT_NAME)

schemes:
  ArcBox:
    build:
      targets:
        ArcBox: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ArcBoxTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
